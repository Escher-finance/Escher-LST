name: Nix/Flakes CI (Rust/CosmWasm)
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Cachix
        uses: cachix/cachix-action@v14
        with:
          name: escher-lst-cache
      - name: Build CosmWasm contracts
        run: |
          nix develop --command bash -c 'cargo wasm -p reward -p liquidstaking-babylon -p cw20-base -p evm-ica'
      - name: Build desktop binaries
        run: |
          nix develop --command bash -c 'cargo build -p create2-miner'
      - name: Test
        run: |
          nix develop --command bash -c 'cargo test --workspace'
      - name: Format
        run: |
          nix develop --command bash -c 'cargo fmt -- --check'
      - name: Clippy
        run: |
          nix develop --command bash -c 'cargo clippy --workspace'
