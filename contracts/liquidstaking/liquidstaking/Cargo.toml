[package]
edition      = { workspace = true }
name         = "liquidstaking"
version      = "0.1.15"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
library = []


[dependencies]
cosmwasm-schema = "2.1.0"
cosmwasm-std = { version = "2.1.0", features = [
  "staking",
  "stargate",
  "cosmwasm_1_4",
  "cosmwasm_2_0",
] }

cw-storage-plus = "2.0.0"
schemars = "0.8.16"
serde = { version = "1.0.197", default-features = false, features = ["derive"] }
thiserror = { version = "1.0.58" }
cw-ownable = "2.1.0"
semver = "1.0"
cw2 = "2.0.0"
cw20 = "2.0.0"

[dependencies.unionlabs_primitives]
path = "../unionlabs-primitives"

[lints]
workspace = true


[dev-dependencies]
cw-multi-test = { version = "2.2.0", features = ["staking"] }